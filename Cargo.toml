[package]
name = "rsplotlib"
version = "0.1.6"
edition = "2024"

[lib]
name = "rsplotlib"
crate-type = ["cdylib"]

[dependencies]
pyo3 = "0.29.0"
plotters = { version = "0.3.7", default-features = false, features = ["svg_backend", "bitmap_backend", "bitmap_encoder", "ab_glyph", "line_series", "point_series"] }
png = "0.17.16"