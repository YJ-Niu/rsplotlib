name: Build and Publish Wheels

on:
  release:
    types: [published]
  workflow_dispatch:  # 允许手动触发

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Linux Wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --sdist -o dist --find-interpreter

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: dist

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Windows Wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release -o dist --find-interpreter

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: dist

  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build macOS (universal2) Wheels
        uses: PyO3/maturin-action@v1
        with:
          # `--universal2` 生成同时支持 x86_64 和 arm64 的单一 Wheel
          args: --release -o dist --universal2 --find-interpreter

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: dist

  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    needs: [linux, windows, macos]
    # 推荐使用 Trusted Publishing (OIDC) — 在 PyPI 项目设置中配置受信发布方
    # 也可使用传统 Token 方式: 在 GitHub Secrets 中设置 PYPI_API_TOKEN
    environment: release
    permissions:
      id-token: write  # Trusted Publishing 需要
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --skip-existing dist/*